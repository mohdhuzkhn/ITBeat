<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->

    <meta name="description" content="ITBeat is a community-driven IT news platform. Discover and share the latest updates in AI, Cloud, Security, Web Dev, and more." />

    <meta property="og:type" content="website" />
